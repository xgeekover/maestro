name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write
  packages: write

jobs:
  backend-image:
    name: 백엔드 Docker 이미지 (GHCR)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/backend.Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/backend:${{ github.ref_name }}
            ghcr.io/${{ github.repository }}/backend:latest

  desktop-installers:
    name: 데스크탑 설치본 (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version: '22'          # pnpm 11.9+ 는 Node >= 22.13 필요
          cache: pnpm
          cache-dependency-path: desktop/pnpm-lock.yaml
      - name: Install
        working-directory: desktop
        run: pnpm install --frozen-lockfile
      - name: Build installers (unsigned)
        working-directory: desktop
        # 코드 서명은 인증서/시크릿 필요(후속). 현재는 미서명 설치본 생성.
        run: pnpm build && pnpm build:electron && pnpm exec electron-builder --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/upload-artifact@v4
        with:
          name: maestro-desktop-${{ matrix.os }}
          path: |
            desktop/release/*.dmg
            desktop/release/*.exe
            desktop/release/*.AppImage
          if-no-files-found: ignore

  github-release:
    name: GitHub Release
    needs: [backend-image, desktop-installers]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: maestro-desktop-*   # 백엔드 잡의 *.dockerbuild 부산물 제외(다운로드 실패 방지)
      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
