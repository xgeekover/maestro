name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  jvm:
    name: JVM build (sdk · protocol · runner · backend)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle
      - name: Gradle build
        run: ./gradlew build --console=plain --stacktrace

  desktop:
    name: Desktop build (Electron + React)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm
          cache-dependency-path: desktop/pnpm-lock.yaml
      - name: Install
        working-directory: desktop
        run: pnpm install --frozen-lockfile
      - name: Typecheck
        working-directory: desktop
        run: pnpm typecheck
      - name: Build
        working-directory: desktop
        run: pnpm build
