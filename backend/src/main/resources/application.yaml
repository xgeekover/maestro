spring:
  application:
    name: maestro-backend
  datasource:
    # 스캐폴딩/Phase4: 인메모리 H2. Phase 5에서 H2 서버모드(다중사용자, ADR-0002 O-1)로 전환.
    url: jdbc:h2:mem:maestro;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    username: sa
    password: ""
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      # Phase 4: ddl-auto. Phase 5(인증/소유권)에서 Flyway 마이그레이션으로 전환.
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate.format_sql: false
  flyway:
    enabled: false
    locations: classpath:db/migration

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus   # QA M-1: 표준 메트릭 노출

# Maestro 오케스트레이터 설정
maestro:
  grpc:
    port: 9090            # 러너 텔레메트리 수신 gRPC 포트 (테스트는 0=임의)
    bind-address: 127.0.0.1   # QA H-1: 기본 루프백(전 인터페이스 노출 금지). 다중호스트 시 0.0.0.0
  cors:                  # QA M-6: 허용 오리진(와일드카드 금지). 외부/Electron 배포 시 추가
    allowed-origins:
      - http://localhost:5173
      - http://localhost:4173
      - http://localhost:3000
  runner:
    backend-host: 127.0.0.1
    stop-grace-ms: 5000
  restart:
    base-delay-ms: 500
    max-delay-ms: 30000
    max-attempts: 5
    watchdog-period-ms: 500
  buffer:
    metric-capacity: 600
    log-capacity: 500
  limits:                  # 실행 리소스 한도(QA C-2) + 종료 런 회수(QA H-4)
    default-tick-timeout-ms: 30000      # 미지정 시 행 워치독 강제(0=무제한 방지)
    max-tick-timeout-ms: 300000
    default-max-heap-bytes: 536870912   # 512MB 기본 heap 캡
    max-max-heap-bytes: 4294967296      # 4GB 상한
    min-tick-period-ms: 10
    default-on-end-timeout-ms: 5000
    terminal-retention-ms: 600000       # 종료 런 10분 보관 후 회수
    max-retained-runs: 1000
    eviction-sweep-ms: 30000
