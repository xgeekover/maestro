spring:
  application:
    name: maestro-backend
  datasource:
    # 스캐폴딩/Phase4: 인메모리 H2. Phase 5에서 H2 서버모드(다중사용자, ADR-0002 O-1)로 전환.
    url: jdbc:h2:mem:maestro;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    username: sa
    password: ""
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      # Phase 4: ddl-auto. Phase 5(인증/소유권)에서 Flyway 마이그레이션으로 전환.
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate.format_sql: false
  flyway:
    enabled: false
    locations: classpath:db/migration

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info

# Maestro 오케스트레이터 설정
maestro:
  grpc:
    port: 9090            # 러너 텔레메트리 수신 gRPC 포트 (테스트는 0=임의)
  runner:
    backend-host: 127.0.0.1
    stop-grace-ms: 5000
  restart:
    base-delay-ms: 500
    max-delay-ms: 30000
    max-attempts: 5
    watchdog-period-ms: 500
  buffer:
    metric-capacity: 600
    log-capacity: 500
